<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PinShot — Editor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: rgba(17, 24, 39, 0.96);
        --pill: rgba(31, 41, 55, 0.96);
        --pill-border: rgba(255, 255, 255, 0.08);
        --accent: #4f46e5;
        --text: #e5e7eb;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--text);
        user-select: none;
        background: var(--bg);
      }
      #editor-root {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        gap: 10px;
        padding: 10px;
      }
      #stage {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        width: 100%;
      }
      .editor-canvas {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 6px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        background: #fff;
        cursor: crosshair;
      }
      .pillbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 8px;
        background: var(--pill);
        border: 1px solid var(--pill-border);
        border-radius: 12px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(12px);
      }
      .tool-btn,
      .action-btn,
      .swatch {
        appearance: none;
        border: 1px solid transparent;
        background: transparent;
        color: var(--text);
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        transition:
          background 0.12s ease,
          transform 0.06s ease;
      }
      .tool-btn,
      .width-btn {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .action-btn {
        height: 34px;
        padding: 0 12px;
        font-size: 13px;
      }
      .tool-btn:hover,
      .action-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .tool-btn.active {
        background: var(--accent);
        color: #fff;
      }
      .action-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .swatch {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.25);
      }
      .swatch:hover {
        transform: scale(1.12);
      }
      .divider {
        width: 1px;
        height: 22px;
        margin: 0 4px;
        background: rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <div id="editor-root">
      <div id="toolbar"></div>
      <div id="stage"></div>
      <div id="actionbar"></div>
    </div>
    <script type="module" src="/src/editor/editor.ts"></script>
  </body>
</html>
