name: CI

# Verify every change on both platforms before it reaches `main`.
# Plain `pull_request` (never pull_request_target) so fork PRs run without
# any access to secrets — none of these jobs need secrets.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {} # manual re-run of a commit without a code change

# Newer pushes to the same ref supersede stale in-progress runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Read-only token; CI publishes nothing.
permissions:
  contents: read

jobs:
  # ---- US3: code-quality gate ----------------------------------------------
  # Runs on cheap Linux. PinShot targets only macOS + Windows, and the shell
  # (xcap/arboard/Tauri) needs platform libraries Linux lacks, so here we lint
  # the platform-independent core crate and the frontend; the shell is linted
  # on its real platforms in build-test. Workspace `cargo fmt` is safe on Linux
  # because it does not compile.
  quality:
    name: Quality (fmt, clippy, lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install pinned Rust toolchain
        run: rustup show # installs channel + components from rust-toolchain.toml

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Rust formatting (whole workspace)
        run: cargo fmt --all -- --check

      - name: Rust clippy (core crate)
        run: cargo clippy -p pinshot-core --all-targets -- -D warnings

      - name: Frontend lint & format
        working-directory: ui
        run: |
          npm ci
          npm run lint
          npm run format:check

  # ---- US1: build, lint & test the whole app on both platforms -------------
  build-test:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false # report both platforms even if one fails
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # The frontend must be built before any cargo compile of the Tauri crate:
      # `tauri::generate_context!` embeds `ui/dist` at compile time.
      - name: Install & build frontend
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Clippy (whole workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

  # ---- Single required status: passes only if every job above passed -------
  ci-ok:
    name: CI OK
    if: ${{ always() }}
    needs: [quality, build-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all checks to have succeeded
        run: |
          echo "quality:    ${{ needs.quality.result }}"
          echo "build-test: ${{ needs.build-test.result }}"
          if [ "${{ needs.quality.result }}" != "success" ] || [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "::error::One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs passed."
